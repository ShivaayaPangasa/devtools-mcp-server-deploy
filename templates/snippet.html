<!DOCTYPE html>
<html>

<head>
    <title>Snippet Viewer</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body>

    <h1>Code Snippet</h1>

    <h2>Language</h2>
    <p>{{ snippet.language }}</p>

    <h2>Summary</h2>
    <p>{{ snippet.summary }}</p>

    <h2>Code</h2>

    <button onclick="copyCode()">Copy Code</button>
    <p style="margin-top:10px;">
    ⚠️ This snippet automatically expires after 7 days.
    </p>
    <pre>
<code class="language-{{ snippet.language }}">
{{ snippet.code }}
</code>
</pre>

    <script>

        hljs.highlightAll();

        function copyCode() {

            const code =
                document.querySelector("code").innerText;

            navigator.clipboard.writeText(code);

            alert("Code copied!");
        }

    </script>

</body>

</html>

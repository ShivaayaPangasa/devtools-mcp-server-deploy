<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snippet Viewer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    body { font-family: monospace; background: #f5f5f5; padding: 32px; max-width: 800px; margin: 0 auto; }
    h2 { font-size: 14px; color: #555; margin-bottom: 8px; }
    pre { background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 4px; overflow-x: auto; }
    #copy-btn { margin-top: 12px; padding: 6px 16px; font-size: 12px; cursor: pointer; }
    #expiry { font-size: 11px; color: #999; margin-top: 8px; }
    #error { color: red; font-size: 13px; }
  </style>
</head>
<body>

  <h2 id="lang-label">Loading snippet...</h2>
  <pre><code id="code-block"></code></pre>
  <div id="summary" style="font-size:12px;color:#666;margin-top:8px;"></div>
  <button id="copy-btn" onclick="copyCode()">Copy</button>
  <div id="expiry">This snippet will expire automatically.</div>
  <div id="error"></div>

  <script>
    const slug = window.location.pathname.split("/").pop();

    // TODO: point this to your real hosted server URL
    fetch(`http://localhost:5000/s/${slug}`)
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          document.getElementById("error").textContent = data.error;
          return;
        }
        const block = document.getElementById("code-block");
        block.textContent = data.code;
        block.className = data.language || "plaintext";
        document.getElementById("lang-label").textContent = data.language || "text";
        document.getElementById("summary").textContent = data.summary || "";
        hljs.highlightElement(block);
      })
      .catch(() => {
        document.getElementById("error").textContent = "Failed to load snippet.";
      });

    function copyCode() {
      const text = document.getElementById("code-block").textContent;
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById("copy-btn").textContent = "Copied!";
        setTimeout(() => document.getElementById("copy-btn").textContent = "Copy", 2000);
      });
    }
  </script>

</body>
</html>
